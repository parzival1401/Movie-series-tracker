<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MovieRec{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0f0f0f] text-white font-sans flex flex-col">

  <nav class="bg-[#1a1a1a] border-b border-white/10 px-6 py-3 flex items-center justify-between">
    <a href="/" class="text-lg font-bold tracking-tight text-white">🎬 MovieRec</a>
    <div class="flex items-center gap-6 text-sm text-gray-400">
      <a href="/library" class="hover:text-white transition">Library</a>
      <a href="/search" class="hover:text-white transition">Search</a>
      <a href="/recommendations" class="hover:text-white transition">Recommendations</a>
    </div>
  </nav>

  <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-600 py-4 border-t border-white/5">
    Powered by TMDB + Gemini
  </footer>

</body>
</html>
