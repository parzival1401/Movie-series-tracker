<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Movie Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full text-gray-100 font-sans">
    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-6">
        <a href="/" class="text-lg font-bold text-indigo-400 hover:text-indigo-300">MovieRec</a>
        <a href="/library" class="text-sm text-gray-300 hover:text-white">Library</a>
        <a href="/search" class="text-sm text-gray-300 hover:text-white">Search</a>
        <a href="/recommendations" class="text-sm text-gray-300 hover:text-white">Recommendations</a>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
